<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Verifying... - TalePayBot</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<style>
@font-face{
  font-family:'HarmonyOS Sans';
  src:url('https://cdn.jsdelivr.net/gh/jsdelivr/font-mirror@main/HarmonyOS_Sans_Regular.ttf') format('truetype');
  font-weight:100 900;font-style:normal;font-display:swap;
}
:root{
  --bg:#050a0e; --text:#ffffff; --muted:#86868b;
  --glow:rgba(83,196,255,0.30);
  --c-glass:#bbbbbc; --c-light:#fff;
  --glass-reflex-light:0.3; --saturation:150%;
  --font:'HarmonyOS Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--font);background-color:var(--bg);color:var(--text);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:24px;overflow:hidden;position:relative;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
.glow-overlay{
  position:fixed;top:0;left:0;right:0;height:60vh;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 0%, var(--glow) 0%, rgba(43,166,255,0) 70%);
  opacity:0;animation:fadeInGlow 1s ease-out .15s forwards;
}
@keyframes fadeInGlow{to{opacity:1}}
.bubbles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bubbles i{
  position:absolute;bottom:-40px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.45), rgba(83,196,255,.12) 60%, transparent 70%);
  box-shadow:inset 0 0 6px rgba(255,255,255,.25);animation:rise linear infinite;opacity:0;
}
@keyframes rise{0%{transform:translateY(0) scale(.6);opacity:0}12%{opacity:.7}100%{transform:translateY(-105vh) scale(1);opacity:0}}
.card{
  position:relative;z-index:2;width:100%;max-width:440px;padding:38px 30px 30px;
  border-radius:28px;text-align:center;
  background:color-mix(in srgb, var(--c-glass) 10%, transparent);
  backdrop-filter:blur(24px) saturate(var(--saturation));
  -webkit-backdrop-filter:blur(24px) saturate(var(--saturation));
  box-shadow:
    inset 0 0 0 1px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 10%), transparent),
    inset 1.8px 3px 0 -2px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 70%), transparent),
    inset -2px -2px 0 -2px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 60%), transparent),
    inset -3px -8px 1px -6px color-mix(in srgb, var(--c-light) calc(var(--glass-reflex-light) * 40%), transparent),
    0 24px 60px rgba(0,0,0,.45);
  opacity:0;transform:translateY(18px);animation:cardIn .7s cubic-bezier(.22,1,.36,1) .1s forwards;
}
@keyframes cardIn{to{opacity:1;transform:translateY(0)}}


h1{font-size:24px;font-weight:800;letter-spacing:-.01em;margin-bottom:10px}
.sub{font-size:15px;line-height:1.5;color:var(--muted);margin:0 auto 26px;max-width:340px}
.challenge-slot{display:flex;justify-content:center;min-height:74px;margin:4px 0 8px}
.challenge-slot :is(iframe,div){margin:0 auto}
.divider{height:1px;background:rgba(255,255,255,.08);margin:24px 0 16px}
.brand{display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:10px}
.brand-logo{
  width:30px;height:30px;border-radius:9px;background:linear-gradient(180deg,#2c2c2e,#222224);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;
  box-shadow:inset 0 1px 1px rgba(255,255,255,.08),inset 0 -1px 1.5px rgba(0,0,0,.18);
}
.brand-logo img{width:24px;height:24px;object-fit:contain}
.brand-name{font-weight:700;font-size:15px}
.ray{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;word-break:break-all}
.ray b{color:rgba(255,255,255,.6);font-weight:600}
</style>
</head>
<body>
<div class="glow-overlay"></div>
<div class="bubbles">
  <i style="left:12%;width:10px;height:10px;animation-duration:9s"></i>
  <i style="left:28%;width:6px;height:6px;animation-duration:7s;animation-delay:1.4s"></i>
  <i style="left:46%;width:14px;height:14px;animation-duration:11s;animation-delay:.6s"></i>
  <i style="left:66%;width:8px;height:8px;animation-duration:8s;animation-delay:2.2s"></i>
  <i style="left:82%;width:11px;height:11px;animation-duration:10s;animation-delay:3.1s"></i>
  <i style="left:90%;width:5px;height:5px;animation-duration:6.5s;animation-delay:1s"></i>
</div>

<main class="card">
  <h1>Verifying your connection</h1>
  <p class="sub">We're making sure your connection is secure before you continue. This only takes a moment.</p>

  <div class="challenge-slot">::CAPTCHA_BOX::</div>

  <div class="divider"></div>

  <div class="brand">
    <span class="brand-logo">
      <img src="https://miniapp.talemods.com/assets/images/talestarsnbg.png" alt="Tale" onerror="this.style.display='none'" />
    </span>
    <span class="brand-name">@talepaybot</span>
  </div>
  <p class="ray">Ray ID: <b>::RAY_ID::</b></p>
</main>
</body>
</html>
